spring:

  datasource:
    # 로컬용
    # url: jdbc:mysql://localhost:3306/layer?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    # username: root
    # password: test1234

    # Railway용
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}


  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true


  thymeleaf:
    cache: false